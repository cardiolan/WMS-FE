<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Bullseye ASE Compact (WMS + FE)</title>

<style>
body { text-align: center; font-family: Arial, sans-serif; background: #f5f5f5; }
svg { width: 450px; height: 450px; margin: 10px auto; display: block; background: white; }
.controls { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; max-width: 400px; margin: 10px auto; }
.controls div { display: flex; align-items: center; justify-content: center; gap: 4px; }
.controls label { font-weight: bold; font-size: 12px; }
button { margin: 6px; padding: 8px 15px; font-size: 14px; }
#wmsResult { margin-top: 10px; font-size: 14px; }
</style>
</head>

<body>

<h2>Bullseye ASE Compact (WMS + FE)</h2>

<svg viewBox="0 0 600 600">

<!-- (TON CODE ORIGINAL 1-12 inchangé ici) -->
<!-- JE GARDE EXACTEMENT TES SEGMENTS 1-12 -->

<!-- ================= APICAL CORRIGÉ ================= -->

<!-- 14 (haut) -->
<path id="seg14" d="
M 229.29 229.29
A 100 100 0 0 1 370.71 229.29
L 328.28 271.71
A 40 40 0 0 0 271.71 271.71
Z" fill="#FFFFFF" stroke="black"/>

<text x="300" y="235" text-anchor="middle" font-size="10">Apical antérieur</text>
<text x="300" y="255" text-anchor="middle" font-size="14">14</text>

<!-- 16 (droite) -->
<path id="seg16" d="
M 370.71 229.29
A 100 100 0 0 1 370.71 370.71
L 328.28 328.28
A 40 40 0 0 0 328.28 271.71
Z" fill="#FFFFFF" stroke="black"/>

<text x="360" y="300" text-anchor="middle" font-size="14">16</text>
<text x="360" y="317" text-anchor="middle" font-size="10">Apical latéral</text>

<!-- 13 (bas) -->
<path id="seg13" d="
M 370.71 370.71
A 100 100 0 0 1 229.29 370.71
L 271.71 328.28
A 40 40 0 0 0 328.28 328.28
Z" fill="#FFFFFF" stroke="black"/>

<text x="300" y="350" text-anchor="middle" font-size="14">13</text>
<text x="300" y="367" text-anchor="middle" font-size="10">Apical inférieur</text>

<!-- 15 (gauche) -->
<path id="seg15" d="
M 229.29 370.71
A 100 100 0 0 1 229.29 229.29
L 271.71 271.71
A 40 40 0 0 0 271.71 328.28
Z" fill="#FFFFFF" stroke="black"/>

<text x="240" y="300" text-anchor="middle" font-size="14">15</text>
<text x="240" y="317" text-anchor="middle" font-size="10">Apical septal</text>

<!-- 17 centre -->
<circle id="seg17" cx="300" cy="300" r="40" fill="#FFFFFF" stroke="black"/>
<text x="300" y="295" text-anchor="middle" font-size="14">17</text>
<text x="300" y="312" text-anchor="middle" font-size="10">Apex</text>

</svg>

<div class="controls">

<script>
for(let i=1;i<=17;i++){
document.write(`
<div>
<label>S${i}</label>
<input type="number" min="0" max="5" value="0"
oninput="updateSegment(${i}); calculateWMS();">
</div>
`)
}
</script>

</div>

<button onclick="resetSegments()">Reset</button>
<button onclick="setAllToNormal()">Tout Normal</button>

<div id="wmsResult">WMS total : 0 | WMSI : 0.00 | FE estimée : --%</div>

<script>

const colors = {
0:"#FFFFFF",
1:"#63BE7B",
2:"#FFEB84",
3:"#FF0000",
4:"#003366",
5:"#7A1FA2"
};

function updateSegment(i){
let seg=document.getElementById("seg"+i);
let input=document.querySelectorAll("input")[i-1];
let val=parseInt(input.value);

if(isNaN(val)||val<0) val=0;
if(val>5) val=5;

input.value=val;
if(seg) seg.setAttribute("fill",colors[val]);
}

function resetSegments(){
document.querySelectorAll("input").forEach(i=>i.value=0);
for(let i=1;i<=17;i++){
let seg=document.getElementById("seg"+i);
if(seg) seg.setAttribute("fill",colors[0]);
}
calculateWMS();
}

function setAllToNormal(){
document.querySelectorAll("input").forEach(i=>i.value=1);
for(let i=1;i<=17;i++){
let seg=document.getElementById("seg"+i);
if(seg) seg.setAttribute("fill",colors[1]);
}
calculateWMS();
}

function calculateWMS(){
let total=0,count=0;

document.querySelectorAll("input").forEach(i=>{
let v=parseInt(i.value);
if(v>0){ total+=v; count++; }
});

let wmsi=count? (total/count).toFixed(2):"0.00";

let fe="--";
if(wmsi<=1.0) fe="≥60";
else if(wmsi<=1.2) fe="55";
else if(wmsi<=1.4) fe="50";
else if(wmsi<=1.6) fe="45";
else if(wmsi<=1.8) fe="40";
else if(wmsi<=2.0) fe="35";
else if(wmsi<=2.2) fe="30";
else if(wmsi<=2.4) fe="25";
else if(wmsi<=2.6) fe="20";
else fe="≤15";

document.getElementById("wmsResult").innerHTML =
`WMS total : ${total} | WMSI : ${wmsi} | FE estimée : ${fe}%`;
}

</script>

</body>
</html>
